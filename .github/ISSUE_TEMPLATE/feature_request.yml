name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe what you'd like to see added or changed.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: I'm trying to do X but there's no way to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: It would help if...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: I've also tried...

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, mockups, examples from other tools.
