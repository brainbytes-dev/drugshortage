<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="60%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f4c75"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#60a5fa" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Left accent bar -->
  <rect x="72" y="160" width="5" height="80" fill="url(#accent)" rx="2"/>

  <!-- Pill icon (simplified) -->
  <g transform="translate(960, 200)" opacity="0.15">
    <ellipse cx="0" cy="0" rx="90" ry="36" fill="none" stroke="#60a5fa" stroke-width="3" transform="rotate(-30)"/>
    <line x1="-90" y1="0" x2="90" y2="0" stroke="#60a5fa" stroke-width="2" transform="rotate(-30)" opacity="0.5"/>
  </g>
  <g transform="translate(1050, 380)" opacity="0.1">
    <ellipse cx="0" cy="0" rx="60" ry="24" fill="none" stroke="#06b6d4" stroke-width="2" transform="rotate(-20)"/>
  </g>
  <g transform="translate(900, 450)" opacity="0.08">
    <ellipse cx="0" cy="0" rx="75" ry="30" fill="none" stroke="#3b82f6" stroke-width="2" transform="rotate(-45)"/>
  </g>

  <!-- Category label -->
  <rect x="88" y="120" width="130" height="26" rx="13" fill="#3b82f6" opacity="0.2"/>
  <text x="153" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#93c5fd" text-anchor="middle" letter-spacing="1.5" font-weight="600">LAGE SCHWEIZ</text>

  <!-- Main headline -->
  <text x="88" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="52" fill="#f8fafc" font-weight="700" letter-spacing="-1">Häufigste Lieferengpässe</text>
  <text x="88" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="52" fill="#f8fafc" font-weight="700" letter-spacing="-1">Medikamente Schweiz</text>

  <!-- Accent line -->
  <rect x="88" y="320" width="480" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- Subtitle -->
  <text x="88" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#94a3b8" font-weight="400">Datenanalyse 2025/2026 — engpassradar.ch</text>

  <!-- Stats row -->
  <g transform="translate(88, 430)">
    <!-- Stat 1 -->
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="42" fill="#38bdf8" font-weight="700" filter="url(#glow)">9'373</text>
    <text x="0" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b" font-weight="400">erfasste Episoden</text>

    <!-- Divider -->
    <line x1="210" y1="-10" x2="210" y2="34" stroke="#334155" stroke-width="1"/>

    <!-- Stat 2 -->
    <text x="228" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="42" fill="#f59e0b" font-weight="700" filter="url(#glow)">705</text>
    <text x="228" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b" font-weight="400">aktuell aktiv</text>

    <!-- Divider -->
    <line x1="390" y1="-10" x2="390" y2="34" stroke="#334155" stroke-width="1"/>

    <!-- Stat 3 -->
    <text x="408" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="42" fill="#34d399" font-weight="700" filter="url(#glow)">9'255</text>
    <text x="408" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b" font-weight="400">unique Präparate</text>
  </g>

  <!-- Footer bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0f172a" opacity="0.6"/>
  <text x="88" y="614" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#475569">Datenstand: April 2026 · Quelle: drugshortage.ch · täglich aktualisiert</text>
  <text x="1112" y="614" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#3b82f6" text-anchor="end" font-weight="600">engpassradar.ch</text>
</svg>
